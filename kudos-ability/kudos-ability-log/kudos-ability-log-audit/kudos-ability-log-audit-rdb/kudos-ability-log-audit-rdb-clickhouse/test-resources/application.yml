# Test config for kudos-ability-log-audit-rdb-clickhouse.
# The actual JDBC URL / username / password come from MongoTestContainer-style DynamicPropertySource
# registration in the test class; this file only configures dynamic-datasource shape.

spring:
  flyway:
    enabled: false
  datasource:
    dynamic:
      primary: ds1
      hikari:
        # ClickHouse needs more time to accept connections than H2; bump the timeout.
        connection-timeout: 30000
        max-pool-size: 4
        min-idle: 1
        # ClickHouse doesn't honor explicit COMMIT for INSERTs (data appears at merge time anyway),
        # but auto-commit needs to be ON for the JDBC driver to flush each INSERT immediately.
        is-auto-commit: true
      datasource:
        ds1:
          driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
          # Placeholders; overridden in DynamicPropertySource.
          url: jdbc:clickhouse://placeholder:8123/placeholder
          username: default
          password: ""

kudos:
  ability:
    cache:
      enabled: false
