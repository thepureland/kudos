spring:
  cloud:
    stream:
      bindings:
        # Audit-log producer
        logAudit-out-0:
          # topic name
          destination: LOG_AUDIT_TOPIC
          # consumer group
          group: logAudit
        # Monitor-message producer — paired with MqMonitorService (@MqProducer bindingName = "logMonitor-out-0").
        logMonitor-out-0:
          destination: LOG_MONITOR_TOPIC
          group: logMonitor