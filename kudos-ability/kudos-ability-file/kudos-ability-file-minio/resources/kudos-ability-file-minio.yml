kudos:
  ability:
    file:
      minio:
        endpoint: http://127.0.0.1:9000
        # Credentials MUST be provided by the application (e.g. via application.yml or
        # environment variables). No defaults ship with this jar - startup fails fast
        # when they are missing. Example:
        # access-key: ${MINIO_ACCESS_KEY}
        # secret-key: ${MINIO_SECRET_KEY}
        public-endpoint: http://127.0.0.1:9000
        sts:
          access-token:
            enabled: false
            client-id: minio
            client-secret: "minio"
            authorization-grant-type: "client_credentials"
            client-authentication-method: "client_secret_basic"
            endpoint: http://127.0.0.1:10001/oauth2/token        # Access Token Endpoint

            # Endpoint Session ID (基于请求头,业务Token认证)
            header-name: Authentication-Info                      # Endpoint Session ID (基于请头头,Token认证)