spring:
  datasource:
    dynamic:
      primary: mysql
      hikari:
        # 连接最长存活时间，略低于 MySQL 服务端 wait_timeout（默认 8 小时）
        max-lifetime: 1800000      # 30 分钟
        # 每次从池里拿连接前先执行检测 SQL
        connection-test-query: SELECT 1
        # 每隔多长时间检测一次空闲连接
        idle-timeout: 300000        # 5 分钟
        # 连接池里最少保留几个空闲连接
        minimum-idle: 5
        # 最大连接数
        maximum-pool-size: 10
      datasource:
        mysql:
          driver-class-name: com.mysql.jdbc.Driver
          url: "jdbc:mysql://localhost:23306/test?useUnicode=true&characterEncoding=utf8"
          username: root
          password: mysql
          init:
            schema: sql/schema.sql
            data: sql/data.sql

logging:
  level:
    org.springframework.context.event: DEBUG
    org.springframework.boot.context.event: DEBUG