spring:
  flyway:
    placeholder-replacement: true
    placeholders:
      flyway_test_name: codex-placeholder
  datasource:
    dynamic:
      primary: ds1
      hikari:
        connection-timeout: 30000
        validation-timeout: 5000
        idle-timeout: 600000
        leak-detection-threshold: 0
        max-lifetime: 1800000
        max-pool-size: 10
        min-idle: 10
        initialization-fail-timeout: 1
        is-auto-commit: false
        is-read-only: false
        is-isolate-internal-queries: false
        is-register-mbeans: false
        is-allow-pool-suspension: false
      datasource:
        master:
          hikari:
            is-auto-commit: false
          driver-class-name: org.h2.Driver
          url: jdbc:h2:mem:flyway-ds-master;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;
          username: sa
          password: sa
        ds1:
          driver-class-name: org.h2.Driver
          url: jdbc:h2:mem:flyway-ds1;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;
          username: sa
          password: sa
#          init:
#            schema: sql/schema.sql
#            data: sql/data.sql
        ds2:
          driver-class-name: org.h2.Driver
          url: jdbc:h2:mem:flyway-ds2;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;
          username: sa
          password: sa
#          init:
#            schema: sql/schema.sql
#            data: sql/data.sql
