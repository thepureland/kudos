kudos:
  ability:
    distributed:
      stream:
        binding-verify:
          enabled: false
          fail-on-missing: false
          required-producer-bindings:
            - mqNotify-out-0
      notify:
        mq:
          fail-on-missing-producer-binding: false

spring:
  cloud:
    stream:
      rocketmq:
        binder:
          name-server: localhost:9876
        bindings:
          mqNotify-out-0:
            producer:
              group: mqNotify_1
      bindings:
        mqNotify-out-0:
          destination: mqNotify
