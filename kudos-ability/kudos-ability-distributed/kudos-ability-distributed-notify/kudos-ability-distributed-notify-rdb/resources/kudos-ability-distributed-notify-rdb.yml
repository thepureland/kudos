soul:
  ability:
    jdbc:
      package-data-source:
        #service包使用数据源。_context代表为从sys_datasource匹配
        org.soul.ability.distributed.notify.rdb.service: master
task:
  cron: 0 */1 * * * ?   # 每分钟执行一次
  initial-delay: 30000   # 延迟30秒后执行
  fixed-rate: 60000
  core-pool-size: 8
  max-pool-size: 16
  queue-capacity: 2
  await-seconds: 60
  keep-alive-seconds: 60
  complete-shutdown: true
  thread-name-prefix: THREAD-POOL-

