server:
  port: 0

spring:
  # Spring Boot 4 将 TransactionAutoConfiguration 移至新包，Seata 2.5 的 SeataSpringFenceAutoConfiguration 仍引用旧类，导致 ClassNotFoundException，测试中排除该自动配置
  autoconfigure:
    exclude:
      - org.apache.seata.spring.boot.autoconfigure.SeataSpringFenceAutoConfiguration
  application:
    name: main-at
  datasource:
    dynamic:
      seata: true   # 让 baomidou dynamic-datasource 在 Bean 装配时就用 SeataDataSourceProxy 包装 DS，
                    # 确保 Spring @Transactional 走的连接与 Ktorm 走的连接是同一个 Seata-proxied 连接。
                    # 否则 Ktorm 通过 currentDataSource() 拿代理、Spring TX 拿裸 Hikari —— 写发生在
                    # Spring TX 之外的孤儿连接上，is-auto-commit=false 让 Hikari 还池时回滚了它。
      primary: postgres
      hikari:
        connection-timeout: 30000
        validation-timeout: 5000
        idle-timeout: 600000
        leak-detection-threshold: 0
        max-lifetime: 1800000
        max-pool-size: 10
        min-idle: 10
        initialization-fail-timeout: 1
        is-auto-commit: true   # Seata AT 模式要求业务数据源 autoCommit=true，否则 ConnectionProxy 的 commit 拦截链根本不会被触发，分支注册永远不发生，写最后被 Hikari 还池时回滚
        is-read-only: false
        is-isolate-internal-queries: false
        is-register-mbeans: false
        is-allow-pool-suspension: false
      datasource:
        postgres:
          type: com.zaxxer.hikari.HikariDataSource
          hikari:
            is-auto-commit: true   # Seata AT 模式要求业务数据源 autoCommit=true，否则 ConnectionProxy 的 commit 拦截链根本不会被触发，分支注册永远不发生，写最后被 Hikari 还池时回滚
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://localhost:25432/test
          username: pg
          password: postgres
          init:
            schema: sql/postgres/schema.sql
            data: sql/postgres/data.sql
#        mysql:
#          type: com.zaxxer.hikari.HikariDataSource
#          hikari:
#            is-auto-commit: true   # Seata AT 模式要求业务数据源 autoCommit=true，否则 ConnectionProxy 的 commit 拦截链根本不会被触发，分支注册永远不发生，写最后被 Hikari 还池时回滚
#          driver-class-name: com.mysql.cj.jdbc.Driver
#          url: jdbc:mysql://mysql:3306/test
#          username: root
#          password: mysql
#          init:
#            schema: sql/mysql/schema.sql
#            data: sql/mysql/data.sql

  cloud:
    nacos:
      config:
        server-addr: localhost:38848
        namespace: public
        file-extension: yml
      discovery:
        server-addr: localhost:38848




