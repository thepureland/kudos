spring:
  datasource:
    dynamic:
      seata: true   # 见 application-main.yml 的同名 key 注释，保持主 / sub-app 一致
      primary: postgres
      hikari:
        connection-timeout: 30000
        validation-timeout: 5000
        idle-timeout: 600000
        leak-detection-threshold: 0
        max-lifetime: 1800000
        max-pool-size: 10
        min-idle: 10
        initialization-fail-timeout: 1
        is-auto-commit: true   # 见 application-main.yml 同名 key 注释
        is-read-only: false
        is-isolate-internal-queries: false
        is-register-mbeans: false
        is-allow-pool-suspension: false
      datasource:
        postgres:
          type: com.zaxxer.hikari.HikariDataSource
          hikari:
            is-auto-commit: true   # 见 application-main.yml 同名 key 注释
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://localhost:25432/test
          username: pg
          password: postgres
#        mysql:
#          type: com.zaxxer.hikari.HikariDataSource
#          hikari:
#            is-auto-commit: true   # 见 application-main.yml 同名 key 注释
#          driver-class-name: com.mysql.cj.jdbc.Driver
#          url: jdbc:mysql://mysql:3306/test
#          username: root
#          password: mysql
#          init:
#            schema: sql/mysql/schema.sql
#            data: sql/mysql/data.sql

  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:38848
        namespace: public
        file-extension: yml
      discovery:
        server-addr: 127.0.0.1:38848
