# Seata server 测试容器配置（基于 apache/seata-server:2.5.0 镜像内置 application.yml 派生）。
#
# Mount 会**整体替换**容器内的 /seata-server/resources/application.yml，因此必须复制镜像内
# bootstrap 必备的项（server / spring / logging）；仅把 seata.* 改成测试需要的注册中心 + 存储模式。
#
# 关键 trip-wire：
# - spring.main.web-application-type=none：Seata 2.5 不是 Web 应用，镜像里没打包 servlet 容器，
#   缺这一项会触发 MissingWebServerFactoryBeanException。
# - logging.file.path 必须存在：Seata 内部代码用 `${logging.file.path}` 占位，
#   缺这一项会让 placeholder 解析直接失败、整个 ApplicationContext 起不来。
# - registry 不写 preferred-networks：testcontainer 默认 bridge 子网是 172.x，
#   原 `30.240.*` 过滤把所有候选网卡都筛掉了，Seata 拿不到注册 IP。

server:
  port: 8091

spring:
  application:
    name: seata-server
  main:
    web-application-type: none

logging:
  config: classpath:logback-spring.xml
  file:
    path: ${log.home:${user.home}/logs/seata}

seata:
  config:
    type: file
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: nacos:8848
      cluster: default
  store:
    mode: file
    session:
      mode: file
    lock:
      mode: file
