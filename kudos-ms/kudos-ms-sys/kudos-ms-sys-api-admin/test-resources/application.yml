spring:
  datasource:
    dynamic:
      primary: h2-tcp
      hikari:
        connection-timeout: 30000
        validation-timeout: 5000
        idle-timeout: 600000
        leak-detection-threshold: 0
        max-lifetime: 1800000
        max-pool-size: 10
        min-idle: 10
        initialization-fail-timeout: 1
        is-auto-commit: false
        is-read-only: false
        is-isolate-internal-queries: false
        is-register-mbeans: false
        is-allow-pool-suspension: false
      datasource:
#        h2:
#          hikari:
#            is-auto-commit: false
#          driver-class-name: org.h2.Driver
#          url: jdbc:h2:~/h2/sys;DATABASE_TO_LOWER=TRUE;
#          username: sa
#          password: sa
        h2-tcp:
          driver-class-name: org.h2.Driver
          url: jdbc:h2:tcp://localhost:1521/mem:test;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;
          username: sa
          password: sa


kudos:
  ability:
    cache:
      enabled: true
    flyway:
      # datasource-config format: {datasource-key: [module-names]}
      datasource-config:
        h2-tcp: sys
